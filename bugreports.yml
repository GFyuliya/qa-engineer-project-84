- summary: |
    Не работает поиск по всем страницам каталога
  environment: |
    Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
    ОС Windows 10 (x64)
  steps-to-reproduce: |
    1. Нажать "Next", тем самым открыв условную вторую страницу каталога __________ скрин
    2. В поисковую строку ввести название товара с этой страницы, например: Mornadi Velvet Bed
    3. Убедиться, что найден товар, выбранный в п.2
    4. Вернуться на предыдущую страницу каталога, нажав "Previous"
    5. Убедиться, что искомый товар пропал, товар не найден
  expected-result: |
    Искомый товар отображается на всех страницах каталога. Поиск работает по всем страницам.
  actual-result: |
    Товар пропал. Поиск сработал только на той странице, на которой находится товар.


