---
- summary: |
    Отображается кнопка "Previous" на первой странице каталога
  environment: |
    Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
    ОС Windows 10 (x64)
  steps-to-reproduce: |
    1. Открыть главную страницу каталога https://hexlet-products-store.vercel.app/
    2. Нажать кнопку "Next"
    3. Нажать кнопку "Previous"
    4. Убедиться, что находимся на первой странице каталога
  expected-result: |
    Кнопки "Previous" нет на пераой странице каталога
  actual-result: |
     Кнопки "Previous" и "Next" есть на первой странице, кнопка "Previous" не работает.


