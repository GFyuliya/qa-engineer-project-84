- summary: |
    Нет возможности отменить ранее выбранную категорию товаров
  environment: |
    Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
    ОС Windows 10 (x64)
  steps-to-reproduce: |
    1. Открыть главную страницу каталога https://hexlet-products-store.vercel.app/
    2. Нажать "Category"
    3. В фильтре "Category" выбрать "laptops"
  expected-result: |
    В фильтре "Category" есть пункт "deselect"
  actual-result: |
    Нельзя сбросить категорию без перезагрузки страницы  


    
- summary: |
    Есть возможность ввести отрицательное значение в фильтр по цене
  environment: |
    Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
    ОС Windows 10 (x64)
  steps-to-reproduce: |
    1. Открыть главную страницу каталога https://hexlet-products-store.vercel.app/
    2. В фильтр по цене ввести любое отрицательное значение
  expected-result: |
    Выводится сообщение о том, что значение не может быть отрицательным
  actual-result: |
    Отрицательное значение в фильтр по уене вводится, нет сообщения об ошибке 


- summary: |
    В каталоге не указан рейтинг товара
  environment: |
    Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
    ОС Windows 10 (x64)
  steps-to-reproduce: |
    1. Открыть главную страницу каталога https://hexlet-products-store.vercel.app/
    2. Убедиться, что на карточке товара под названием товара не указан рейтинг
  expected-result: |
    На главной странице каталога на карточке товара указан рейтинг
  actual-result: |
    Рейтинг товара не указан на главной странице
