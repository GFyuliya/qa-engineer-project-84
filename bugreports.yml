  environment: |
    Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
    ОС Windows 10 (x64)
  steps-to-reproduce: |
    1. Нажать кнопку "Language" в верхнем меню сайта
    2. Выбрать русский язык
  expected-result: |
    Все содержимое сайта, кроме брендов и наименований товаров переведены на русский язык
