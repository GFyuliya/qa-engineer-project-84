- summary: |
    Проверка возможности добавления товара в корзину
  requirement: |
    Пользователь должен иметь возможность добавить товар в корзину
  prerequisites:
    Открыта страница каталога
    В каталоге есть товары
  test-data: |
    нет данных
  steps:
    - На выбранном товаре нажимаем на кнопку "В корзину"
    - Переходим в корзину, нажав на пункт меню "Корзина"
  expected-result: |
    Выбранный товар успешно добавлен в корзину

- summary: |
     Проверка возможности просмотра каталога после добавления товаров в корзину
  requirement: |
     Пользователь имеет возможность добавить товар в корзину и продолжать выбирать товары в каталоге.
  prerequisites: |
     Открыта главная страница
     В каталоге есть товары
  test-data: |
     нет данных        
  steps:
    - Нажать на кнопку "В корзину" на одном или нескольких товарах
    - Перейти в корзину, нажав на пункт меню "Корзина"
    - Нажать кнопку "Продолжить покупки"
  expected-result: |
    Пользователь должен попасть на главную страницу каталога 

- summary: |
     Проверка удаления товара из корзины
  requirement: |
     На странице корзины пользователь может удалить товар из корзины
  prerequisites: |
     Открыта главная страница
     В каталоге есть товары
  test-data: |
     нет данных        
  steps:
    - Нажать кнопку "В корзину" на любом товаре 
    - Перейти в корзину, нажав на пункт меню "Корзина"
    - Нажать кнопку "Удалить" напротив товара
  expected-result: |
    Товар должен удалиться из корзины

- summary: |
     Пользователь может очистить корзину
  requirement: |
     После добавления товаров в корзину, пользователь может очистить ее одним нажатием
  prerequisites: |
     Открыта главная страница
     В каталоге есть товары
  test-data: |
     нет данных        
  steps:
    - Нажать кнопку "В корзину" на нескольких товарах
    - Перейти в корзину, нажав на пункт меню "Корзина"
    - Нажать кнопку "Очистить корзину"
  expected-result: |
    Корзина должна стать пустой

