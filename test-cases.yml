- summary: |
     Корзина хранится в сессии браузера
  requirement: |
     Корзина должна сохраняться до закрытия браузера
  prerequisites: |
     Открыта главная страница 
  test-data: |
     нет данных        
  steps:
    - Нажать кнопку "В корзину" на любом товаре 
    - Перейти в корзину, нажав на пункт меню "Корзина"
    - Закрыть используемый браузер
    - Открыть этот же браузер
    - Перейти на страницу интернет-магазина
    - Нажать кнопку "Корзина" в шапке сайта
  expected-result: |
    Корзина пользователя должна быть пустой
    
