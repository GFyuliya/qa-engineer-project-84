    Открыта страница каталога
    Фильтры не выбраны
  test-data: |
    Category = laptops
    Ключевое слово = samsung
  steps:
    - В фильтре "Category" выбираем "laptops"
    - В поле поиска вводим ключевое слово
  expected-result: |
    Без перезагрузки страницы должны отобразиться только samsung из категории laptops

