bugreports:
  - summary: |
      При выборе пустой категории нельзя отфильтровать товары по другим параметрам
    environment: |
      Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
      ОС Windows 10 (x64)
    steps-to-reproduce: |
      1. В фильтрах отметить любой бренд
      2. Нажать "Category" и выбрать пустой пункт
    expected-result: |
      В каталоге остались товары соответствующие выбранному бренду
    actual-result: |
      В каталоге отображаются все товары. Аналогичная проблема при фильтрации по цене


  - summary: |
      При снятии галочки "In Stock" остаётся одна страница с товарами
    environment: |
      Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
      ОС Windows 10 (x64)
    steps-to-reproduce: |
      1. На главной странице каталога 
      2. Нажать "Category" и выбрать пустой пункт убрать галочку фильтра "In Stock"
    expected-result: |
      Отображаются все все товары, в том числе и те, которых на данный момент нет в наличии
    actual-result: |
      Осталась одна страница стоварами, пропала кнопка "Next"


 - summary: |
    При некорректном запросе в поисковой строке отображаются все товары
  environment: |
      Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
      ОС Windows 10 (x64)
  steps-to-reproduce: |
      1. На главной странице каталога в поисковую строку ввести "rpwp613"
  expected-result: |
      Без перезагрузки страницы должно появиться сообщение "Nothing found!"
  actual-result: |
      В каталоге отображаются все товары


 - summary: |
    Кнопка "Add to cart" и кол-во товара выходят за границы карточки товара
  environment: |
      Google Chrome Версия 123.0.6312.86 (Официальная сборка), (64 бит)
      ОС Windows 10 (x64)
  steps-to-reproduce: |
      1. В фильтре по бренду выбрать OPPO
  expected-result: |
      В каталоге отображается смартфон OPPO, карточка данного товара узкая: кнопка "Add to cart" и кол-во товара  выходят за границы карточки
  actual-result: |
      Наименование товара, описание, цена со скидкой и без, кнопка "Add to cart" находятся в пределах карточки товара, не выходят за ее границы.
      Аналогично с брендами на первой странице: Infinix, Royal_Mirage, Lord - Al-Rehab, Saaf & Khaas, Baking Food Items, Dry Rose, Boho Decor, Golden;
      на второй странице: Ratttan Outdoor, Kitchen Shelf, Multi Purpose, RED MICKY MOUSE.., Digital Printed, IELGY fashion, Synthetic Leather


      фильтр по цене - не пишет ничего не найдено, фильтр учитывает цену без скидки
      проверить фильтрацию по нескольким параметрам
      опечатка Royal_Mirage - Royal Mirage
      Lord - Al-Rehab - бренд только Al Rehab 
